# /etc/X11/xorg.conf.d/10-annotator.conf
# Force 1920x1080 on QEMU/hardware, prefer evdev for all input devices.

Section "Monitor"
    Identifier  "Monitor0"
    Modeline    "1920x1080_60" 148.50 1920 2008 2052 2200 1080 1084 1089 1125 +hsync +vsync
    Option      "PreferredMode" "1920x1080"
EndSection

Section "Screen"
    Identifier  "Screen0"
    Monitor     "Monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth    24
        Modes    "1920x1080"
    EndSubSection
EndSection

Section "Device"
    Identifier  "Device0"
    # Let X auto-pick the best available driver (intel → vesa fallback)
EndSection

Section "InputClass"
    Identifier  "evdev touchscreen"
    MatchIsTouchscreen "on"
    Driver      "evdev"
    Option      "EmulateThirdButton" "0"
EndSection
