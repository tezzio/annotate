# /etc/X11/xorg.conf.d/10-annotator.conf
# Minimal config for QEMU virtio-vga + USB tablet.
#
# Input fix: use evdev InputClass matching /dev/input/event* directly.
# This avoids by-path symlinks (PS/2 paths don't exist for USB HID devices
# like the QEMU usb-tablet, which registers as a USB HID absolute pointer).
# 99-inputs.conf generated at boot by /etc/init.d/S20input adds explicit
# InputDevice stanzas as a belt-and-suspenders fallback.

Section "Monitor"
    Identifier  "Monitor0"
    Option      "PreferredMode" "1920x1080"
EndSection

Section "Device"
    Identifier  "Device0"
    # No Driver specified: Xorg auto-selects:
    #   modesetting — when KMS is active (QEMU virtio-gpu, or KMS entry)
    #   fbdev        — when booted with nomodeset (real hardware default)
    Option      "AccelMethod" "none"
    # virtio-gpu has no HW cursor plane — force SW cursor so it is visible
    Option      "SWCursor"    "true"
EndSection

Section "Screen"
    Identifier  "Screen0"
    Device      "Device0"
    Monitor     "Monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth    24
        Modes    "1920x1080" "1024x768"
    EndSubSection
EndSection

# Catch-all: every /dev/input/event* node via evdev.
# Works with mdev and eudev — no by-path udev symlinks required.
Section "InputClass"
    Identifier  "evdev catchall"
    MatchDevicePath "/dev/input/event*"
    Driver      "evdev"
EndSection

Section "InputClass"
    Identifier  "evdev keyboard"
    MatchIsKeyboard "on"
    Driver      "evdev"
    Option      "XkbLayout" "us"
    Option      "XkbModel"  "pc105"
EndSection

Section "InputClass"
    Identifier  "evdev pointer"
    MatchIsPointer "on"
    Driver      "evdev"
EndSection

Section "InputClass"
    Identifier  "evdev touchscreen"
    MatchIsTouchscreen "on"
    Driver      "evdev"
    Option      "SwapAxes" "false"
EndSection
